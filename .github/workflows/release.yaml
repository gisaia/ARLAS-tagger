name: Release ARLAS-tagger

on:
  workflow_dispatch:
    inputs:
      api_major_version:
        description: "API Major version"
        required: true
      api_minor_version:
        description: "API Minor version"
        required: true
      api_patch_version:
        description: "API Patch version"
        required: true
      arlas_dev:
        description: "Next development patch version (SNAPSHOT will be added automatically)"
        required: true
      run_tests:
        description: "Run integration tests"
        type: boolean
        default: false
      skip_api:
        description: "Skip API client generation"
        type: boolean
        default: false

env:
  FULL_API_VERSION: "${{ inputs.api_major_version }}.${{ inputs.api_minor_version }}.${{ inputs.api_patch_version }}"
  API_DEV_VERSION: "${{ inputs.api_major_version }}.${{ inputs.api_minor_version }}.${{ inputs.arlas_dev }}"
  IS_DEVELOP: ${{ github.ref_name == 'develop' }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      # -------------------------------------------------------
      # Checkout
      # -------------------------------------------------------
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Log release context
        run: |
          echo "Releasing from branch    : ${{ github.ref_name }}"
          echo "Version                  : ${{ env.FULL_API_VERSION }}"
          echo "Next dev version         : ${{ env.API_DEV_VERSION }}-SNAPSHOT"
          echo "Merge to master          : ${{ env.IS_DEVELOP }}"
          echo "Generate CHANGELOG       : ${{ env.IS_DEVELOP }}"
          echo "Run tests                : ${{ inputs.run_tests }}"
          echo "Skip API                 : ${{ inputs.skip_api }}"

      # -------------------------------------------------------
      # Tooling setup
      # -------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
          cache-dependency-path: |
            **/pom.xml
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # -------------------------------------------------------
      # Version bump
      # -------------------------------------------------------
      - name: Update project version
        run: |
          mvn clean
          mvn versions:set -DnewVersion=${FULL_API_VERSION}
          sed -i 's/"API_VERSION"/"'"${FULL_API_VERSION}"'"/' arlas-tagger-rest/src/main/java/io/arlas/tagger/rest/tag/TagRESTService.java

      # ----------------------------------------
      # Build
      # ----------------------------------------
      - name: Build with Maven
        run: mvn clean install -DskipTests --no-transfer-progress --no-snapshot-updates

      # -------------------------------------------------------
      # Start stack and generate OpenAPI spec
      # -------------------------------------------------------
      - name: Start Elasticsearch
        run: |
          export ELASTIC_DATADIR="/tmp"
          docker compose -f docker/docker-files/docker-compose-elasticsearch.yml --project-name arlas up -d --build
          docker run --net arlas_default --rm busybox sh -c \
            'i=1; until nc -w 2 elasticsearch 9200; do if [ $i -lt 30 ]; then sleep 1; else break; fi; i=$(($i+1)); done'

      - name: Start Kafka
        run: |
          export KAFKA_DATADIR="/tmp"
          docker compose -f docker/docker-files/docker-compose-kafka.yml --project-name arlas up -d --build
          docker run --net arlas_default --rm busybox sh -c \
            'i=1; until nc -w 2 kafka 29092; do if [ $i -lt 60 ]; then sleep 1; else break; fi; i=$(($i+1)); done'

      - name: Start arlas-tagger
        run: |
          export ARLAS_SERVER_NODE=""
          docker compose -f docker/docker-files/docker-compose.yml --project-name arlas up -d --build

      - name: Wait for arlas-tagger readiness
        run: |
          DOCKER_IP=localhost
          i=1; until nc -w 2 ${DOCKER_IP} 19998; do if [ $i -lt 30 ]; then sleep 1; else break; fi; i=$(($i+1)); done

      - name: Fetch OpenAPI spec
        run: |
          DOCKER_IP=localhost
          mkdir -p target/tmp openapi
          i=1; until curl -XGET http://${DOCKER_IP}:19998/arlas_tagger/openapi.json -o target/tmp/openapi.json; do if [ $i -lt 60 ]; then sleep 1; else break; fi; i=$(($i+1)); done
          i=1; until curl -XGET http://${DOCKER_IP}:19998/arlas_tagger/openapi.yaml -o target/tmp/openapi.yaml; do if [ $i -lt 60 ]; then sleep 1; else break; fi; i=$(($i+1)); done
          cp target/tmp/openapi.yaml openapi/
          cp target/tmp/openapi.json openapi/

      - name: Stop arlas-tagger stack
        if: always()
        run: |
          docker compose \
            -f docker/docker-files/docker-compose.yml \
            -f docker/docker-files/docker-compose-elasticsearch.yml \
            -f docker/docker-files/docker-compose-kafka.yml \
            --project-name arlas down -v

      # -------------------------------------------------------
      # Generate API documentation
      # -------------------------------------------------------
      - name: Generate API documentation
        run: |
          mkdir -p docs/api
          docker run --rm \
            --mount dst=/input/api.json,src="$PWD/openapi/openapi.json",type=bind,ro \
            --mount dst=/input/env.json,src="$PWD/conf/doc/widdershins.json",type=bind,ro \
            --mount dst=/output,src="$PWD/docs/api",type=bind \
            gisaia/widdershins:4.0.1

      # -------------------------------------------------------
      # Integration tests
      # -------------------------------------------------------
      - name: Run integration tests
        if: ${{ inputs.run_tests }}
        run: ./scripts/ci/tests-integration.sh

      # -------------------------------------------------------
      # Generate API clients
      # -------------------------------------------------------
      - name: Generate TypeScript API client
        if: ${{ !inputs.skip_api }}
        run: |
          mkdir -p target/tmp/typescript-fetch
          docker run --rm \
            -e GROUP_ID="$(id -g)" \
            -e USER_ID="$(id -u)" \
            --mount dst=/input/api.json,src="$PWD/target/tmp/openapi.json",type=bind,ro \
            --mount dst=/output,src="$PWD/target/tmp/typescript-fetch",type=bind \
            gisaia/swagger-codegen-3.0.42 \
              -l typescript-fetch --additional-properties modelPropertyNaming=snake_case

      - name: Build TypeScript API client
        if: ${{ !inputs.skip_api }}
        run: |
          cd target/tmp/typescript-fetch/
          cp ../../../conf/npm/package-build.json package.json
          cp ../../../conf/npm/tsconfig-build.json .
          npm version --no-git-tag-version ${FULL_API_VERSION}
          npm install
          npm run build-release
          npm run postbuild
          cd $GITHUB_WORKSPACE

      - name: Publish TypeScript API client to npm
        if: ${{ !inputs.skip_api }}
        run: |
          cp conf/npm/package-publish.json target/tmp/typescript-fetch/dist/package.json
          cd target/tmp/typescript-fetch/dist
          npm version --no-git-tag-version ${FULL_API_VERSION}
          case ${FULL_API_VERSION} in
            *rc* )
              npm publish --tag=rc || echo "Publishing on npm failed ... continue ..."
              ;;
            *beta* )
              npm publish --tag=beta || echo "Publishing on npm failed ... continue ..."
              ;;
            *)
              npm publish || echo "Publishing on npm failed ... continue ..."
              ;;
          esac

      # -------------------------------------------------------
      # Docker push (release only)
      # -------------------------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Tag and push Docker image
        run: |
          docker tag  gisaia/arlas-tagger:latest gisaia/arlas-tagger:${FULL_API_VERSION}
          docker push gisaia/arlas-tagger:${FULL_API_VERSION}
          docker push gisaia/arlas-tagger:latest

      # -------------------------------------------------------
      # Changelog, commit, tag & merge (release only)
      # -------------------------------------------------------
      - name: Create temporary tag for changelog
        if: ${{ env.IS_DEVELOP == 'true' }}
        run: |
          git tag v${{ env.FULL_API_VERSION }}
          git push origin v${{ env.FULL_API_VERSION }}

      - name: Generate CHANGELOG.md
        if: ${{ env.IS_DEVELOP == 'true' }}
        run: |
          docker run --rm -v "$(pwd)":/usr/local/src/your-app \
            gisaia/github-changelog-generator:latest github_changelog_generator \
              -u gisaia -p ARLAS-tagger \
              --token ${{ secrets.GH_CHANGELOG_TOKEN }} \
              --no-pr-wo-labels --no-issues-wo-labels --no-unreleased \
              --issue-line-labels API,OGC,conf,security,documentation \
              --exclude-labels type:duplicate,type:question,type:wontfix,type:invalid \
              --bug-labels type:bug \
              --enhancement-labels type:enhancement \
              --breaking-labels type:breaking \
              --enhancement-label "**New stuff:**" \
              --issues-label "**Miscellaneous:**" \
              --since-tag v0.0.1
          git tag -d v${{ env.FULL_API_VERSION }}
          git push origin :v${{ env.FULL_API_VERSION }}
      - name: Commit release artifacts
        run: |
          git add docs/api openapi/openapi.json openapi/openapi.yaml
          git commit -a -m "release version ${{ env.FULL_API_VERSION }}"
          git tag v${{ env.FULL_API_VERSION }}
          git push origin v${{ env.FULL_API_VERSION }}
          git push origin ${{ github.ref_name }}

      - name: Merge develop into master
        if: ${{ env.IS_DEVELOP == 'true' }}
        run: |
          git checkout master
          git pull origin master
          git merge origin/develop
          git push origin master
          git checkout develop
          git pull origin develop
          git rebase origin/master

      # -------------------------------------------------------
      # Bump to next SNAPSHOT version
      # -------------------------------------------------------
      - name: Bump to next development version
        run: |
          git checkout ${{ github.ref_name }}
          mvn versions:set -DnewVersion=${{ env.API_DEV_VERSION }}-SNAPSHOT
          sed -i 's/"${{ env.FULL_API_VERSION }}"/"API_VERSION"/' arlas-tagger-rest/src/main/java/io/arlas/tagger/rest/tag/TagRESTService.java
          sed -i 's/"${{ env.FULL_API_VERSION }}"/"${{ env.API_DEV_VERSION }}-SNAPSHOT"/' openapi/openapi.yaml openapi/openapi.json
          git add openapi/openapi.json openapi/openapi.yaml
          git commit -a -m "development version ${{ env.API_DEV_VERSION }}-SNAPSHOT"
          git push origin ${{ github.ref_name }}

      # -------------------------------------------------------
      # Notify Google Chat
      # -------------------------------------------------------
      - name: Notify Google Chat
        if: ${{ env.GOOGLE_CHAT_RELEASE_CHANEL != '' }}
        env:
          GOOGLE_CHAT_RELEASE_CHANEL: ${{ secrets.GOOGLE_CHAT_RELEASE_CHANEL }}
        run: |
          curl -X POST --header "Content-Type:application/json" \
            "$GOOGLE_CHAT_RELEASE_CHANEL" \
            -d "{\"text\":\"Release of ARLAS-tagger, version ${{ env.FULL_API_VERSION }} (from branch ${{ github.ref_name }})\"}"